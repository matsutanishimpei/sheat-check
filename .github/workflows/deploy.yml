name: Deploy All
on:
  push:
    branches: [ "main" ]

jobs:
  # 1. 完全に型チェックとテストが通ることを検証するCIジョブ
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check Types
        run: npm run typecheck
      - name: Run Tests
        run: npm run test

  # 2. テストが完全に合格した後にのみ実行されるバックエンドデプロイ
  deploy-backend:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      # バックエンドのデプロイ
      - name: Deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          command: deploy
          workingDirectory: 'packages/backend'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # 3. テスト合格およびバックエンドデプロイ完了後にのみ実行されるフロントエンドデプロイ
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [validate-and-test, deploy-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      # フロントエンドのビルドとデプロイ
      - run: npm run build -w packages/frontend
      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          command: pages deploy packages/frontend/dist --project-name=あなたのプロジェクト名
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}