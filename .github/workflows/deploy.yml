name: Deploy All
on:
  push:
    branches: [ "main" ]

jobs:
  # 1. 完全に型チェックとテストが通ることを検証するCIジョブ
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check Types
        run: npm run typecheck
      - name: Run Tests
        run: npm run test

  # 2. テストが完全に合格した後にのみ実行されるバックエンドデプロイ
  deploy-backend:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      # バックエンドのデプロイ前に、D1データベースのマイグレーションを本番環境へ自動適用
      - name: Apply Production D1 Migrations
        working-directory: packages/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply DB --remote

      # バックエンドのデプロイ
      - name: Deploy API
        working-directory: packages/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --minify src/index.ts

  # 3. テスト合格およびバックエンドデプロイ完了後にのみ実行されるフロントエンドデプロイ
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [validate-and-test, deploy-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      # フロントエンドのビルドとデプロイ
      - run: npm run build -w packages/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy packages/frontend/dist --project-name=seets-check